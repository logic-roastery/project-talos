# air config for live reload during development
# Install: go install github.com/air-verse/air@latest

root = "."
tmp_dir = "data/tmp"

[build]
  bin = "./data/tmp/talos"
  cmd = "go build -o ./data/tmp/talos ./cmd/talos"
  delay = 1000
  exclude_dir = ["data", "bin", "web/templates", ".git"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true
