{{define "backup_row.html"}}
<tr id="backup-{{.ID}}" class="border-b border-hairline/50 hover:bg-ink/50 transition">
    <td class="px-4 py-3 font-medium text-body font-mono text-xs">{{.Filename}}</td>
    <td class="px-4 py-3 text-muted">{{formatSize .Size}}</td>
    <td class="px-4 py-3 text-muted">{{timeAgo .CreatedAt}}</td>
    <td class="px-4 py-3">
        <div class="flex items-center gap-3">
            <a href="/api/backups/{{.ID}}/download"
               class="text-xs text-violet hover:text-violet/80 transition uppercase tracking-wider font-bold">
                Download
            </a>
            <button hx-post="/api/backups/{{.ID}}/restore"
                hx-on::click="event.preventDefault(); event.stopPropagation(); restoreBackup{{.ID}}()"
                class="text-xs text-lime-accent hover:text-lime-accent/80 transition uppercase tracking-wider font-bold cursor-pointer">
                Restore
            </button>
            <button hx-delete="/api/backups/{{.ID}}"
                hx-on::click="event.preventDefault(); event.stopPropagation(); deleteBackup{{.ID}}()"
                hx-target="#backup-{{.ID}}"
                hx-swap="outerHTML"
                class="text-xs text-muted hover:text-pink-accent transition uppercase tracking-wider font-bold cursor-pointer">
                Delete
            </button>
        </div>
    </td>
</tr>
<script>
async function restoreBackup{{.ID}}() {
    try { await showConfirm({ title: 'Restore backup', message: 'This will stop all services and replace the database.', confirmText: 'Restore', variant: 'warning' }); } catch { return; }
    const res = await fetch('/api/backups/{{.ID}}/restore', { method: 'POST' });
    if (res.ok) {
        showToast({ type: 'success', title: 'Backup restored', message: 'Please restart the server to apply changes.' });
    } else {
        showToast({ type: 'error', title: 'Restore failed', message: 'Could not restore backup.' });
    }
}
async function deleteBackup{{.ID}}() {
    try { await showConfirm({ title: 'Delete backup', message: 'This cannot be undone.', confirmText: 'Delete', variant: 'danger' }); } catch { return; }
    const res = await fetch('/api/backups/{{.ID}}', { method: 'DELETE' });
    if (res.ok) {
        document.getElementById('backup-{{.ID}}').remove();
        showToast({ type: 'success', title: 'Backup deleted' });
    } else {
        showToast({ type: 'error', title: 'Delete failed', message: 'Could not delete backup.' });
    }
}
</script>
{{end}}
