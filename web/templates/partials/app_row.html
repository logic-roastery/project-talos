{{define "app_row.html"}}
<tr id="app-row-{{.ID}}" class="border-b border-hairline/50 hover:bg-ink/50 transition">
    <td class="px-4 py-3">
        <a href="/apps/{{.ID}}" class="text-violet hover:text-lime-accent font-medium transition">{{.Name}}</a>
        <div class="mt-1">
            <span class="inline-flex items-center rounded-full border border-hairline px-2 py-0.5 text-[10px] uppercase tracking-[0.16em] text-muted">{{.AppType}}</span>
        </div>
    </td>
    <td class="px-4 py-3">
        <span class="inline-flex items-center gap-1.5 text-xs px-2 py-0.5 rounded-full {{statusBg .Status}} {{statusText .Status}} border {{statusBorder .Status}}">
            <span class="w-1.5 h-1.5 rounded-full {{statusDot .Status}}"></span>
            {{.Status}}
        </span>
    </td>
    <td class="px-4 py-3 text-muted">{{if .Branch}}{{.Branch}}{{else}}—{{end}}</td>
    <td class="px-4 py-3">
        {{if .AccessURL}}
        <a href="{{.AccessURL}}" target="_blank" class="text-muted hover:text-lime-accent transition text-xs">
            {{.AccessURL}}
        </a>
        {{else}}
        <span class="text-gray-600">—</span>
        {{end}}
    </td>
    <td class="px-4 py-3 text-muted text-xs">{{timeAgo .UpdatedAt}}</td>
</tr>
{{end}}
