{{define "flash.html"}}
<div class="flex items-center gap-3 px-4 py-3 rounded-lg
    {{if eq .Color "red"}}bg-pink-accent/10 border border-pink-accent/20 text-pink-accent
    {{else if eq .Color "yellow"}}bg-yellow-400/10 border border-yellow-400/20 text-yellow-400
    {{else if eq .Color "green"}}bg-lime-accent/10 border border-lime-accent/20 text-lime-accent
    {{else}}bg-canvas-dark border border-hairline text-muted{{end}}
    text-sm">
    {{if eq .Color "red"}}
    <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z" />
    </svg>
    {{else if eq .Color "green"}}
    <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
    </svg>
    {{else}}
    <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    {{end}}
    <span>{{.Message}}</span>
</div>
{{end}}
