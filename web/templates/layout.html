<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — Talos</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='256' height='256' viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='256' height='256' fill='%230B132B'/%3E%3Cdefs%3E%3Cpattern id='grid' width='16' height='16' patternUnits='userSpaceOnUse'%3E%3Cpath d='M 16 0 L 0 0 0 16' fill='none' stroke='%231C2541' stroke-width='1'/%3E%3C/pattern%3E%3C/defs%3E%3Crect width='256' height='256' fill='url(%23grid)'/%3E%3Cline x1='128' y1='0' x2='128' y2='256' stroke='%2347A8BD' stroke-width='1' stroke-opacity='0.5'/%3E%3Cline x1='0' y1='128' x2='256' y2='128' stroke='%2347A8BD' stroke-width='1' stroke-opacity='0.5'/%3E%3Cpath d='M 128 16 L 224 72 L 224 184 L 128 240 L 32 184 L 32 72 Z' fill='none' stroke='%2347A8BD' stroke-width='2' stroke-dasharray='4 4'/%3E%3Crect x='76' y='80' width='104' height='28' rx='4' fill='none' stroke='%234EEAFA' stroke-width='2'/%3E%3Crect x='114' y='116' width='28' height='64' rx='4' fill='none' stroke='%234EEAFA' stroke-width='2'/%3E%3Ccircle cx='90' cy='94' r='6' fill='none' stroke='%23FFF' stroke-width='1'/%3E%3Ccircle cx='166' cy='94' r='6' fill='none' stroke='%23FFF' stroke-width='1'/%3E%3Ccircle cx='128' cy='166' r='6' fill='none' stroke='%23FFF' stroke-width='1'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                colors: {
                    midnight: '#150f23',
                    ink: '#1f1633',
                    'lime-accent': '#c2ef4e',
                    violet: '#6a5fc1',
                    'violet-deep': '#422082',
                    'violet-mid': '#79628c',
                    'pink-accent': '#fa7faa',
                    'canvas-dark': 'var(--canvas)',
                    night: 'var(--surface)',
                    hairline: 'var(--hairline)',
                    muted: 'var(--muted)',
                    heading: 'var(--heading)',
                    body: 'var(--body)',
                    subtle: 'var(--subtle)',
                    faint: 'var(--faint)',
                },
                fontFamily: {
                    sans: ['Rubik', '-apple-system', 'system-ui', 'Segoe UI', 'Helvetica', 'Arial', 'sans-serif'],
                    mono: ['Monaco', 'Menlo', 'Ubuntu Mono', 'monospace'],
                },
            },
        },
    }
    </script>
    <style>
        body { font-family: 'Rubik', -apple-system, system-ui, 'Segoe UI', Helvetica, Arial, sans-serif; }

        /* Dark theme (default) — DESIGN.md surface-canvas-dark / surface-night */
        :root {
            --canvas: #1f1633;
            --surface: #150f23;
            --hairline: #362d59;
            --muted: #bdb8c0;
            --heading: #f3f4f6;
            --body: #e5e7eb;
            --subtle: #d1d5db;
            --faint: #9ca3af;
        }

        /* Light theme — DESIGN.md surface-canvas-light */
        .light {
            --canvas: #ffffff;
            --surface: #f5f5f5;
            --hairline: #e5e7eb;
            --muted: #6b7280;
            --heading: #111827;
            --body: #374151;
            --subtle: #6b7280;
            --faint: #9ca3af;
        }
    </style>
    <script>
        // Restore theme preference from localStorage
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'light') {
                document.documentElement.classList.remove('dark');
                document.documentElement.classList.add('light');
            } else {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>
<body class="min-h-screen bg-canvas-dark text-body">
    {{if .User}}
    <nav class="border-b border-hairline bg-night/80 backdrop-blur px-6 py-3 flex items-center justify-between">
        <a href="/dashboard" class="text-lg font-bold text-lime-accent tracking-tight">talos</a>
        <div class="flex items-center gap-4 text-sm">
            <a href="/dashboard" class="text-muted hover:text-body transition">Dashboard</a>
            <a href="/services" class="text-muted hover:text-body transition">Services</a>
            <a href="/backups" class="text-muted hover:text-body transition">Backups</a>
            <a href="/settings" class="text-muted hover:text-body transition">Settings</a>
            <span class="text-muted">{{.User.Username}}</span>
            <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme"
                class="text-muted hover:text-body transition cursor-pointer p-1">
                <svg id="icon-sun" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <svg id="icon-moon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
            </button>
            <button hx-post="/logout" hx-push-url="true"
                class="text-muted hover:text-pink-accent transition cursor-pointer uppercase text-xs font-bold tracking-wider">logout</button>
        </div>
    </nav>
    {{end}}
    <main class="mx-auto max-w-5xl px-6 py-8">
        {{.Content}}
    </main>
    <div id="flash-container" class="fixed bottom-4 right-4 z-50 flex flex-col items-end gap-2 pointer-events-none"></div>

    <!-- Confirm modal backdrop -->
    <div id="confirm-backdrop" class="fixed inset-0 z-[60] bg-black/50 backdrop-blur-sm hidden items-center justify-center p-4" onclick="if(event.target===this)_confirmReject()">
        <div class="w-full max-w-md rounded-xl border border-hairline bg-night p-5 shadow-2xl pointer-events-auto">
            <div class="flex items-start gap-3">
                <div id="confirm-icon" class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg"></div>
                <div class="flex-1 min-w-0">
                    <p id="confirm-title" class="text-sm font-semibold text-heading"></p>
                    <p id="confirm-message" class="mt-1 text-sm text-muted"></p>
                </div>
            </div>
            <div class="mt-4 flex justify-end gap-2">
                <button onclick="_confirmReject()" class="px-3 py-1.5 text-sm text-muted hover:text-body transition cursor-pointer rounded-lg">Cancel</button>
                <button id="confirm-action" onclick="_confirmResolve()" class="px-3 py-1.5 text-sm font-medium rounded-lg transition cursor-pointer"></button>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.classList.contains('dark');
            if (isDark) {
                html.classList.remove('dark');
                html.classList.add('light');
                localStorage.setItem('theme', 'light');
                document.getElementById('icon-sun').classList.add('hidden');
                document.getElementById('icon-moon').classList.remove('hidden');
            } else {
                html.classList.remove('light');
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                document.getElementById('icon-sun').classList.remove('hidden');
                document.getElementById('icon-moon').classList.add('hidden');
            }
        }
        // Set correct icon on load
        (function() {
            const isLight = document.documentElement.classList.contains('light');
            if (isLight) {
                document.getElementById('icon-sun')?.classList.add('hidden');
                document.getElementById('icon-moon')?.classList.remove('hidden');
            }
        })();

        // --- Toast notification system ---
        const _toastIcons = {
            info: '<svg class="h-4 w-4 text-violet" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
            success: '<svg class="h-4 w-4 text-lime-accent" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9,12 11,14 15,10"/></svg>',
            warning: '<svg class="h-4 w-4 text-yellow-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
            error: '<svg class="h-4 w-4 text-pink-accent" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
        };
        const _toastColors = {
            info:    { border: 'border-violet/20',          bg: 'bg-violet/10',          iconBg: 'bg-violet/15',          text: 'text-violet',          sub: 'text-violet/80',          dismiss: 'text-violet/60 hover:text-violet' },
            success: { border: 'border-lime-accent/20',     bg: 'bg-lime-accent/10',     iconBg: 'bg-lime-accent/15',     text: 'text-lime-accent',     sub: 'text-lime-accent/80',     dismiss: 'text-lime-accent/60 hover:text-lime-accent' },
            warning: { border: 'border-yellow-400/20',      bg: 'bg-yellow-400/10',      iconBg: 'bg-yellow-400/15',      text: 'text-yellow-400',      sub: 'text-yellow-400/80',      dismiss: 'text-yellow-400/60 hover:text-yellow-400' },
            error:   { border: 'border-pink-accent/20',     bg: 'bg-pink-accent/10',     iconBg: 'bg-pink-accent/15',     text: 'text-pink-accent',     sub: 'text-pink-accent/80',     dismiss: 'text-pink-accent/60 hover:text-pink-accent' },
        };

        /**
         * showToast({ type: 'info'|'success'|'warning'|'error', title: string, message: string, duration?: number })
         */
        function showToast(opts) {
            const c = _toastColors[opts.type] || _toastColors.info;
            const icon = _toastIcons[opts.type] || _toastIcons.info;
            const el = document.createElement('div');
            el.className = 'pointer-events-auto flex items-start gap-3 rounded-xl border ' + c.border + ' ' + c.bg + ' p-4 shadow-lg max-w-sm animate-[toastIn_0.2s_ease-out]';
            el.innerHTML = '<div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg ' + c.iconBg + '">' + icon + '</div>' +
                '<div class="flex-1 min-w-0">' +
                '<p class="text-sm font-semibold ' + c.text + '">' + _esc(opts.title) + '</p>' +
                (opts.message ? '<p class="mt-1 text-sm ' + c.sub + '">' + _esc(opts.message) + '</p>' : '') +
                '</div>' +
                '<button onclick="this.closest(\'div\').remove()" class="shrink-0 ' + c.dismiss + ' transition cursor-pointer" aria-label="Dismiss">' +
                '<svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
            document.getElementById('flash-container').appendChild(el);
            const dur = opts.duration || 4000;
            if (dur > 0) setTimeout(function() { el.remove(); }, dur);
        }

        // --- Confirm dialog ---
        let _confirmResolve, _confirmReject;

        /**
         * showConfirm({ title: string, message: string, confirmText?: string, variant?: 'danger'|'warning'|'info' })
         * Returns a Promise that resolves on confirm, rejects on cancel.
         */
        function showConfirm(opts) {
            return new Promise(function(resolve, reject) {
                _confirmResolve = function() { document.getElementById('confirm-backdrop').classList.add('hidden'); document.getElementById('confirm-backdrop').classList.remove('flex'); resolve(); };
                _confirmReject  = function() { document.getElementById('confirm-backdrop').classList.add('hidden'); document.getElementById('confirm-backdrop').classList.remove('flex'); reject(); };
                const v = opts.variant || 'danger';
                const colors = {
                    danger:  { iconBg: 'bg-pink-accent/15',    icon: _toastIcons.error,   btnBg: 'bg-pink-accent/10 hover:bg-pink-accent/20 border-pink-accent/30',    btnText: 'text-pink-accent' },
                    warning: { iconBg: 'bg-yellow-400/15',     icon: _toastIcons.warning, btnBg: 'bg-yellow-400/10 hover:bg-yellow-400/20 border-yellow-400/30',     btnText: 'text-yellow-400' },
                    info:    { iconBg: 'bg-violet/15',         icon: _toastIcons.info,    btnBg: 'bg-violet/10 hover:bg-violet/20 border-violet/30',                 btnText: 'text-violet' },
                };
                const vc = colors[v] || colors.danger;
                document.getElementById('confirm-icon').className = 'flex h-9 w-9 shrink-0 items-center justify-center rounded-lg ' + vc.iconBg;
                document.getElementById('confirm-icon').innerHTML = vc.icon;
                document.getElementById('confirm-title').textContent = opts.title || 'Are you sure?';
                document.getElementById('confirm-message').textContent = opts.message || '';
                const btn = document.getElementById('confirm-action');
                btn.textContent = opts.confirmText || 'Confirm';
                btn.className = 'px-3 py-1.5 text-sm font-medium rounded-lg border transition cursor-pointer ' + vc.btnBg + ' ' + vc.btnText;
                document.getElementById('confirm-backdrop').classList.remove('hidden');
                document.getElementById('confirm-backdrop').classList.add('flex');
            });
        }

        function _esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    </script>
    <style>@keyframes toastIn { from { opacity: 0; transform: translateY(1rem) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }</style>
</body>
</html>
