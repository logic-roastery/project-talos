<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — Talos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    midnight: '#150f23',
                    ink: '#1f1633',
                    'lime-accent': '#c2ef4e',
                    violet: '#6a5fc1',
                    'violet-deep': '#422082',
                    'violet-mid': '#79628c',
                    'pink-accent': '#fa7faa',
                    'canvas-dark': '#1f1633',
                    night: '#150f23',
                    hairline: '#362d59',
                    muted: '#bdb8c0',
                },
                fontFamily: {
                    sans: ['Rubik', '-apple-system', 'system-ui', 'Segoe UI', 'Helvetica', 'Arial', 'sans-serif'],
                    mono: ['Monaco', 'Menlo', 'Ubuntu Mono', 'monospace'],
                },
            },
        },
    }
    </script>
    <style>
        body { font-family: 'Rubik', -apple-system, system-ui, 'Segoe UI', Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-canvas-dark text-gray-200">
    {{if .User}}
    <nav class="border-b border-hairline bg-night/80 backdrop-blur px-6 py-3 flex items-center justify-between">
        <a href="/dashboard" class="text-lg font-bold text-lime-accent tracking-tight">talos</a>
        <div class="flex items-center gap-4 text-sm">
            <a href="/dashboard" class="text-muted hover:text-gray-200 transition">Dashboard</a>
            <a href="/services" class="text-muted hover:text-gray-200 transition">Services</a>
            <a href="/settings/github/status" class="text-muted hover:text-gray-200 transition">GitHub</a>
            <span class="text-muted">{{.User.Username}}</span>
            <button hx-post="/logout" hx-push-url="true"
                class="text-muted hover:text-pink-accent transition cursor-pointer uppercase text-xs font-bold tracking-wider">logout</button>
        </div>
    </nav>
    {{end}}
    <main class="mx-auto max-w-5xl px-6 py-8">
        {{.Content}}
    </main>
    <div id="flash-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>
</body>
</html>
