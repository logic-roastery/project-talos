{{define "services.html"}}
<div class="flex items-center justify-between mb-8">
    <h1 class="text-xl font-semibold text-gray-100">Managed Services</h1>
    <a href="/services/new" class="bg-lime-accent text-midnight font-bold px-4 py-3 rounded-md hover:bg-lime-accent/90 transition text-sm uppercase tracking-wider">
        + New Service
    </a>
</div>

{{if .Services}}
<div class="bg-night border border-hairline rounded-xl overflow-hidden">
    <table class="w-full text-sm">
        <thead>
            <tr class="border-b border-hairline text-left text-xs text-muted uppercase tracking-wider">
                <th class="px-4 py-3">Name</th>
                <th class="px-4 py-3">Type</th>
                <th class="px-4 py-3">Image</th>
                <th class="px-4 py-3">Status</th>
                <th class="px-4 py-3">Port</th>
            </tr>
        </thead>
        <tbody>
            {{range .Services}}
            <tr class="border-b border-hairline/50 hover:bg-ink/50 cursor-pointer transition"
                onclick="window.location='/services/{{.ID}}'">
                <td class="px-4 py-3 font-medium text-gray-200">{{.Name}}</td>
                <td class="px-4 py-3">
                    <span class="text-xs px-2 py-1 rounded-md bg-violet-mid/20 text-violet">
                        {{.Type}}
                    </span>
                </td>
                <td class="px-4 py-3 text-muted font-mono text-xs">{{.ImageRef}}</td>
                <td class="px-4 py-3">
                    <span class="inline-flex items-center gap-1.5 text-xs px-2 py-0.5 rounded-full {{statusBg .Status}} {{statusText .Status}} border {{statusBorder .Status}}">
                        <span class="w-1.5 h-1.5 rounded-full {{statusDot .Status}}"></span>
                        {{.Status}}
                    </span>
                </td>
                <td class="px-4 py-3 text-muted">{{.InternalPort}}</td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
{{else}}
<div class="bg-night border border-hairline rounded-xl p-12 text-center">
    <p class="text-muted mb-4">No managed services yet.</p>
    <a href="/services/new" class="inline-block bg-lime-accent text-midnight font-bold px-4 py-3 rounded-md hover:bg-lime-accent/90 transition text-sm uppercase tracking-wider">
        Create your first service
    </a>
</div>
{{end}}
{{end}}
