{{define "setup.html"}}
<div class="flex min-h-[60vh] items-center justify-center">
    <div class="w-full max-w-sm">
        <h1 class="text-2xl font-bold text-lime-accent mb-1">talos</h1>
        <p class="text-muted text-sm mb-8">Create your admin account to get started.</p>
        <form hx-post="/setup" hx-target="#form-errors" hx-swap="innerHTML"
              hx-on::after-request="if(event.detail.successful) window.location.href='/dashboard'">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-muted mb-1 uppercase tracking-wider font-medium">Username</label>
                    <input type="text" name="username" required autocomplete="username"
                        class="w-full bg-canvas-dark border border-hairline rounded-md px-3 py-2 text-gray-200 focus:border-violet focus:ring-1 focus:ring-violet/30 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-xs text-muted mb-1 uppercase tracking-wider font-medium">Password</label>
                    <input type="password" name="password" required minlength="8" autocomplete="new-password"
                        class="w-full bg-canvas-dark border border-hairline rounded-md px-3 py-2 text-gray-200 focus:border-violet focus:ring-1 focus:ring-violet/30 focus:outline-none transition">
                </div>
                <button type="submit"
                    class="w-full bg-lime-accent text-midnight font-bold uppercase tracking-wider px-4 py-3 rounded-md hover:bg-lime-accent/90 transition cursor-pointer text-sm">
                    Create Account
                </button>
            </div>
        </form>
        <div id="form-errors" class="mt-4"></div>
    </div>
</div>
{{end}}
