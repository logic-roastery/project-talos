{{define "setup.html"}}
<div class="flex min-h-[60vh] items-center justify-center">
    <div class="w-full max-w-sm">
        <h1 class="text-2xl font-bold text-green-400 mb-1">talos</h1>
        <p class="text-gray-500 text-sm mb-8">Create your admin account to get started.</p>
        <form hx-post="/setup" hx-target="#form-errors" hx-swap="innerHTML"
              hx-on::after-request="if(event.detail.successful) window.location.href='/dashboard'">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-500 mb-1 uppercase tracking-wider">Username</label>
                    <input type="text" name="username" required autocomplete="username"
                        class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-gray-200 focus:border-green-400 focus:ring-1 focus:ring-green-400 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1 uppercase tracking-wider">Password</label>
                    <input type="password" name="password" required minlength="8" autocomplete="new-password"
                        class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-gray-200 focus:border-green-400 focus:ring-1 focus:ring-green-400 focus:outline-none transition">
                </div>
                <button type="submit"
                    class="w-full bg-green-400 text-gray-950 font-bold px-4 py-2 rounded hover:bg-green-300 transition cursor-pointer">
                    Create Account
                </button>
            </div>
        </form>
        <div id="form-errors" class="mt-4"></div>
    </div>
</div>
{{end}}
