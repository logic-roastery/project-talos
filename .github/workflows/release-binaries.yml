name: Binary Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: >
          go build
          -ldflags="-s -w -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}"
          -o talos-linux-${{ matrix.arch }} ./cmd/talos
      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: talos-linux-${{ matrix.arch }}
